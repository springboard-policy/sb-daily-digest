name: Springboard Daily Policy Brief

on:
  schedule:
    # 15:00 UTC = 10:00 AM EST / 11:00 AM EDT
    - cron: '0 15 * * 1-5'   # weekdays only
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html brief_*.md
          git diff --cached --quiet || git commit -m "brief: $(date -u '+%Y-%m-%d')"
          git push
