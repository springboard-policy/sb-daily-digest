name: Springboard Daily Policy Brief

on:
  schedule:
    # Two cron entries cover 8:30 AM ET regardless of DST.
    # Double-run prevention is handled in Python by _already_ran_today(),
    # which skips the agent if today's brief already exists.
    - cron: '30 12 * * 1-5'   # 12:30 UTC = 8:30 AM EDT (summer)
    - cron: '30 13 * * 1-5'   # 13:30 UTC = 8:30 AM EST (winter)
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ brief_*.md
          git diff --cached --quiet || git commit -m "brief: $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push
