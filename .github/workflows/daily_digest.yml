name: Springboard Daily Policy Brief

on:
  schedule:
    # 8:30 AM ET year-round (two entries to account for DST)
    - cron: '30 12 * 3-10 1-5'    # Mar–Oct: 12:30 UTC = 8:30 AM EDT
    - cron: '30 13 * 1,2,11,12 1-5'  # Nov–Feb: 13:30 UTC = 8:30 AM EST
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html brief_*.md
          git diff --cached --quiet || git commit -m "brief: $(date -u '+%Y-%m-%d')"
          git push
