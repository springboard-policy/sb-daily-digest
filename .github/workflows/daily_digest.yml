name: Springboard Daily Policy Brief

on:
  schedule:
    # Fire at both possible 8:30 AM ET times every weekday.
    # The "Check Toronto time" step below skips whichever one is wrong,
    # so DST transitions are handled exactly without month approximations.
    - cron: '30 12 * * 1-5'   # 8:30 AM EDT (UTC-4, summer)
    - cron: '30 13 * * 1-5'   # 8:30 AM EST (UTC-5, winter)
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check Toronto time
        id: timecheck
        run: |
          # Always proceed on manual triggers.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # For scheduled runs, only proceed if it's actually 8:xx AM ET.
          HOUR=$(TZ="America/Toronto" date +%H)
          if [ "$HOUR" = "08" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Current Toronto time: $(TZ='America/Toronto' date '+%H:%M %Z') — skipping duplicate trigger."
          fi

      - name: Check out repository
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.timecheck.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate brief
        if: steps.timecheck.outputs.should_run == 'true'
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:          khiran@springboardpolicy.com
        run: python generate_digest.py

      - name: Commit and push output
        if: steps.timecheck.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ brief_*.md
          git diff --cached --quiet || git commit -m "brief: $(date -u '+%Y-%m-%d')"
          git push

      - name: Notify on failure
        if: failure() && steps.timecheck.outputs.should_run == 'true'
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       khiran@springboardpolicy.com
        run: |
          python3 -c "
import os, smtplib
from email.mime.text import MIMEText
sender   = os.environ.get('EMAIL_FROM', '')
password = os.environ.get('EMAIL_PASSWORD', '')
to       = os.environ.get('EMAIL_TO', '')
if not (sender and password and to):
    print('Email credentials not set — skipping failure notification')
    exit(0)
url = 'https://github.com/khiran-oneill/sb-daily-digest/actions'
msg = MIMEText(f'<p style=\"font-family:sans-serif\">The Springboard daily brief <strong>failed</strong> today.<br><br><a href=\"{url}\">View the GitHub Actions log</a> for details.</p>', 'html')
msg['Subject'] = 'SB Policy Brief \u2014 run failed'
msg['From']    = sender
msg['To']      = to
with smtplib.SMTP('smtp.gmail.com', 587) as s:
    s.ehlo(); s.starttls(); s.login(sender, password)
    s.sendmail(sender, [to], msg.as_string())
print('Failure notification sent.')
"
